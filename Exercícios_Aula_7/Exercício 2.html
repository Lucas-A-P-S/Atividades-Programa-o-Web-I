<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <ul id="ListaÑordenada">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <button onclick="adicionarItem()">Adicionar Item na Lista</button>

    <script>
        function adicionarItem(){
            const li = document.createElement("li");
            li.textContent = "Novo item!";
            const lista = document.getElementById("ListaÑordenada");
            lista.appendChild(li);
        }
    </script>

</body>
</html>
