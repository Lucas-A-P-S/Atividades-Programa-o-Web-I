<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
    <style>
        table{
            border-collapse: collapse;
            background-color: #f9f9f9;
        }
        th, td{
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th{
            background-color: blue;
            color: white;
            text-align: center;
        }
        tr:nth-child(even){
            background-color: cornflowerblue;
        }
        tr:hover{
            background-color: red;
        }
    </style>
</head>
<body>
    <table width="700px">
        <thead>
            <tr>
                <th>Base de cálculo mensal em R$</th>
                <th>Alíquota %</th>
                <th>Parcela a deduzir do imposto em R$</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Até 1.903,98</td>
                <td>-</td>
                <td>-</td>
            </tr>
            <tr>
                <td>De 1.903,99 até 2.826,65</td>
                <td>7,5</td>
                <td>142,80</td>
            </tr>
            <tr>
                <td>De 2.826,66 até 3.751,05</td>
                <td>15,0</td>
                <td>354,80</td>
            </tr>
            <tr>
                <td>De 3.751,06 até 4.664,68</td>
                <td>22,5</td>
                <td>636,13</td>
            </tr>
            <tr>
                <td>Acima de 4.664,68</td>
                <td>27,5</td>
                <td>869,36</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
